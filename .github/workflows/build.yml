name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Uses Gradle 8.6 directly — no wrapper jar needed
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: ${{ github.workspace }}

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk pantry-plus-build${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Pantry+ — Build ${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: pantry-plus-build${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
